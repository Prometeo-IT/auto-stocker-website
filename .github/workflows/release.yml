name: Release dist

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Ensure tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag commit ${GITHUB_SHA} is not reachable from origin/main"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Package dist artifacts
        run: |
          tar -czf "auto-stocker-website-${GITHUB_REF_NAME}.tar.gz" dist
          zip -r "auto-stocker-website-${GITHUB_REF_NAME}.zip" dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum auto-stocker-website-${GITHUB_REF_NAME}.* > SHA256SUMS.txt

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            auto-stocker-website-${{ github.ref_name }}.tar.gz
            auto-stocker-website-${{ github.ref_name }}.zip
            SHA256SUMS.txt
